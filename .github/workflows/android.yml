name: Android

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    # Job key + name kept verbatim ("build" / "Build APK") so the
    # workflow's required-status-check context on `main` flips to a
    # debug-free label as part of this PR. The branch-protection rule
    # is updated to require "Build APK" at merge time — see PR body.
    name: Build APK
    # Self-hosted runner on katana (jp-desktop). Switched off
    # ubuntu-latest 2026-05-12 after the jphein account hit its 3,000
    # Actions-min/mo cap. The desktop has JDK 17, Android SDK 34/35,
    # build-tools, adb, and a persistent ~/.gradle cache between runs
    # — so this is both free and faster than a cold hosted runner.
    # When/if we move back to hosted, swap `runs-on` for
    # `ubuntu-latest` and re-add the setup-java / setup-android /
    # actions/cache steps from git history.
    runs-on: [self-hosted, linux, android]
    timeout-minutes: 45
    permissions:
      # write required by softprops/action-gh-release on tag builds.
      # PR / main pushes don't reach that step, but the permission is
      # declared at job scope to keep `if:` step gating simple.
      contents: write
    env:
      JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
      ANDROID_HOME: /home/jp/Android/Sdk
      ANDROID_SDK_ROOT: /home/jp/Android/Sdk
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Materialize local.properties from runner-persistent location
        # Self-hosted runner is katana (jp-desktop). The runner's
        # checkout starts without a local.properties (gitignored), so
        # INSTANTDB_APP_ID lives in JP's primary checkout's copy. The
        # `cp` source is a static absolute path (no untrusted input),
        # so no command-injection surface.
        # If we move back to ubuntu-latest, replace this with a step
        # that writes local.properties from `${{ secrets.* }}`.
        run: |
          if [ -f /home/jp/Projects/storyvox/local.properties ]; then
            cp /home/jp/Projects/storyvox/local.properties ./local.properties
          fi

      - name: Assemble release APK
        # Issue #529 — was `:app:assembleDebug` through v0.5.57. Flipped
        # to `:app:assembleRelease` so the shipped artifact carries
        # `BuildConfig.DEBUG = false`, R8 minification stays on, and
        # the on-reader debug overlay can never reach end users. See
        # `app/build.gradle.kts` for the build-type rewrite that
        # backs this change. The signing config still points at the
        # checked-in debug keystore (no signature change for users —
        # existing sideload installs upgrade in place).
        run: PATH="$JAVA_HOME/bin:$PATH" ./gradlew :app:assembleRelease --no-daemon --stacktrace

      - name: Cold-launch perf guard (Issue #618)
        # Reads the StartupBenchmark JSON (if present) and fails the
        # build when the cold-launch median exceeds the threshold
        # pinned in baselineprofile/.../ColdLaunchThresholds.kt
        # (tablet 1500 ms, phone 500 ms). Skips quietly when no
        # benchmark output exists — PR runs do not attach a device,
        # so the guard is a no-op there. On tag builds with a
        # connected device the previous step's macrobench leaves a
        # JSON report under the conventional location.
        #
        # The guard ALWAYS runs (even on PR) so the script's
        # threshold-file integrity check + threshold parsing is
        # exercised on every CI run — a regression that breaks the
        # parser is caught at PR time even though the threshold check
        # itself is skipped without a device.
        run: ./scripts/check-cold-launch.sh

      - name: Rename APK with tag
        # Only runs on tag builds — for PR / main pushes we just
        # verify the build compiles and stop. The local-build path
        # in `app/build.gradle.kts` (applicationVariants.all) already
        # renames `app-release.apk` -> `candela-v<versionName>.apk`
        # at AGP-output time. We still re-cp here using the tag name
        # so the published asset uses the GIT TAG (which may diverge
        # from versionName in pathological cases — historical sanity
        # check from v0.4.x tagging mishaps).
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          TAG: ${{ github.ref_name }}
        run: |
          OUT_DIR=app/build/outputs/apk/release
          # Prefer the AGP-renamed file; fall back to app-release.apk
          # if the variant rename ever stops firing.
          SRC=$(ls "$OUT_DIR"/candela-v*.apk 2>/dev/null | head -1)
          if [ -z "$SRC" ]; then
            SRC="$OUT_DIR/app-release.apk"
          fi
          DST="$OUT_DIR/candela-${TAG}.apk"
          # `cp file file` errors with exit 1 — happens when AGP's
          # applicationVariants rename already produced the
          # tag-named file. Skip the copy in that case.
          if [ "$SRC" != "$DST" ]; then
            cp "$SRC" "$DST"
          fi

      - name: Create GitHub release
        # Used to be a separate `release:` job that pulled the APK
        # via actions/download-artifact. Collapsed into the build
        # job 2026-05-12 because the GitHub Actions artifact-storage
        # quota also hit zero (separate from the minutes cap) — so
        # upload-artifact + download-artifact would fail. GitHub
        # *releases* use a different storage quota that isn't capped,
        # so attaching directly via softprops/action-gh-release stays
        # within budget. Since both halves now share a self-hosted
        # runner, the APK is just on disk; no transfer needed.
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          body: |
            Release APK build for `${{ github.ref_name }}`.

            > Signed with the project's checked-in keystore (stable since v0.4.15). Sideload-only distribution today.
          files: app/build/outputs/apk/release/candela-${{ github.ref_name }}.apk
