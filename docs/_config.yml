title: Candela
description: A neural-voice audiobook player for any text you have. Seventeen fiction backends, three in-process neural voice families, optional Azure HD cloud voices. Brass-on-warm-dark Library Nocturne aesthetic. Free, GPL-3.0, no telemetry, no per-character billing.
url: https://storyvox.techempower.org
baseurl: ""

# Default social-share card (override per-page via front-matter image:)
image: /screenshots/03-reader.png

# Use a minimal theme; we override most styling via _sass / assets/css.
theme: minima
minima:
  skin: dark

# Plugins available on GitHub Pages by default.
plugins:
  - jekyll-relative-links
  - jekyll-seo-tag

# Resolve relative .md links to .html so cross-page links keep working.
relative_links:
  enabled: true
  collections: false

# Don't surface specs / drafts as part of the public site.
exclude:
  - superpowers/
  - ROADMAP.md
  - compose-gotchas.md
  - VOICES.md  # consolidated into voices.md, kept in repo for legacy links
  - README.md
  - Gemfile
  - Gemfile.lock

# Sensible defaults.
markdown: kramdown
kramdown:
  syntax_highlighter: rouge
  smart_quotes: ["apos", "apos", "quot", "quot"]

# Author / SEO.
author:
  name: JP Hein
  email: jp@jphein.com
twitter:
  card: summary_large_image

# Pretty permalinks for the marketing pages.
permalink: pretty
